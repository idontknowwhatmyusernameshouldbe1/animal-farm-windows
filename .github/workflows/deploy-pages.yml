name: Deploy Windows download site

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Read app version
        id: ver
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content desktop/src/AnimalFarm.App/AnimalFarm.App.csproj
          $version = $csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1
          if (-not $version) { $version = "1.0.0" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "App version: $version"

      - name: Preserve previous releases from gh-pages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path site/releases | Out-Null
          git fetch origin gh-pages --depth=1 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No gh-pages branch to preserve from (first deploy or fetch failed)."
            exit 0
          }

          # Paths may not exist on older gh-pages trees — never fail the job.
          git checkout origin/gh-pages -- releases 2>$null
          git checkout origin/gh-pages -- versions.json 2>$null

          if (Test-Path releases) {
            Copy-Item -Path releases/* -Destination site/releases/ -Force -ErrorAction SilentlyContinue
            Write-Host "Restored release files from gh-pages."
          }
          if (Test-Path versions.json) {
            Copy-Item versions.json site/versions.json -Force
            Write-Host "Restored versions.json from gh-pages."
          }

          exit 0

      - name: Publish Animal Farm (self-contained win-x64)
        run: |
          dotnet publish desktop/src/AnimalFarm.App/AnimalFarm.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -o artifacts/AnimalFarm

      - name: Zip release + update versions.json
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Force -Path site/releases | Out-Null

          $versioned = "site/releases/AnimalFarm-Windows-$version.zip"
          $latest = "site/AnimalFarm-Windows.zip"
          if (Test-Path $versioned) { Remove-Item $versioned -Force }
          if (Test-Path $latest) { Remove-Item $latest -Force }

          Compress-Archive -Path artifacts/AnimalFarm/* -DestinationPath $versioned -Force
          Copy-Item $versioned $latest -Force

          $label = "$version"
          $manifestPath = "site/versions.json"
          $manifest = @{ latest = $version; versions = @() }
          if (Test-Path $manifestPath) {
            try {
              $existing = Get-Content $manifestPath -Raw | ConvertFrom-Json
              if ($existing.versions) {
                $manifest.versions = @($existing.versions | Where-Object { $_.version -ne $version })
              }
            } catch {}
          }

          $entry = [pscustomobject]@{
            version = $version
            file = "releases/AnimalFarm-Windows-$version.zip"
            label = $label
          }
          $manifest.versions = @($entry) + @($manifest.versions)
          $manifest | ConvertTo-Json -Depth 5 | Set-Content $manifestPath -Encoding utf8

          Get-Item $versioned, $latest | Format-List Name, Length
          Get-Content $manifestPath

      - name: Deploy site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
